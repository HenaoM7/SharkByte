# ============================================
# SharkByte — Docker Compose PRODUCCIÓN
# Usar junto con docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================

version: "3.8"

services:

  mongodb:
    restart: always
    # En producción, NO exponer MongoDB públicamente
    ports: []
    # Solo accesible en red interna de Docker

  mongo-express:
    # En producción, desactivar Mongo Express
    # O protegerlo con autenticación fuerte
    profiles:
      - debug  # Solo se levanta si: docker compose --profile debug up

  n8n:
    restart: always
    # En Linux, host.docker.internal no resuelve por defecto — este override lo habilita
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      N8N_PROTOCOL: https
      N8N_HOST: ${N8N_DOMAIN:-n8n.sharkbyteia.com}
      WEBHOOK_URL: ${WEBHOOK_URL}
      # Deshabilitar métricas de telemetría en producción
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
    # En producción, Nginx hace de proxy, no exponemos el puerto directamente
    ports: []

  evolution-api:
    restart: always
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      LOG_LEVEL: "ERROR,WARN"
    # No exponer al exterior, solo via Nginx
    ports: []
