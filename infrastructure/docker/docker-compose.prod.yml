# ============================================
# SharkByte — Docker Compose PRODUCCIÓN
# Usar junto con docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================

services:

  n8n:
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      N8N_PROTOCOL: https
      N8N_HOST: ${N8N_DOMAIN:-n8n.sharkbyteia.com}
      WEBHOOK_URL: ${WEBHOOK_URL}
    # En producción, Nginx hace de proxy, no exponemos el puerto directamente
    ports: []

  evolution-api:
    restart: always
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      LOG_LEVEL: "ERROR,WARN"
    # No exponer al exterior, solo via Nginx
    ports: []
