# ============================================================
# SharkByte — Docker Compose
# Para producción: copiar .env.example → .env y configurar
# todas las variables marcadas como REQUERIDO EN PRODUCCIÓN
# ============================================================

services:

  # ─── n8n PostgreSQL (BD interna de n8n) ───────────────────
  n8n-postgres:
    image: postgres:15
    container_name: eco_n8n_postgres
    restart: always
    environment:
      POSTGRES_USER: ${N8N_DB_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:-n8n_pass}
      POSTGRES_DB: n8n
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER:-n8n}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ─── n8n ──────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:1.82.3
    container_name: eco_n8n
    restart: always
    ports:
      - "5678:5678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Auth básica
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-admin123}
      # Webhook / host
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      # Base de datos PostgreSQL (producción)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:-n8n_pass}
      # Clave de cifrado para credenciales almacenadas
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-changeme-encryption-key}
      # Deshabilitar telemetría
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      # Habilitar task runners (requerido en n8n v1.x+)
      N8N_RUNNERS_ENABLED: "true"
      # Permisos de settings
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      # Backend API — usada en workflows
      BACKEND_URL: ${BACKEND_URL:-http://host.docker.internal:3000}
      BACKEND_INTERNAL_KEY: ${BACKEND_INTERNAL_KEY:-changeme-internal-key}
      # Evolution API — usada en workflows
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://eco_evolution:8080}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-superapikey}
      # OpenAI — usada en workflows
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      n8n-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Evolution API PostgreSQL ──────────────────────────────
  evolution-postgres:
    image: postgres:15
    container_name: eco_evolution_postgres
    restart: always
    environment:
      POSTGRES_USER: ${EVOLUTION_DB_USER:-evolution}
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD:-evolution123}
      POSTGRES_DB: evolution
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EVOLUTION_DB_USER:-evolution}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ─── Evolution Redis ───────────────────────────────────────
  evolution-redis:
    image: redis:7
    container_name: eco_evolution_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ─── Evolution API (WhatsApp) ──────────────────────────────
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: eco_evolution
    restart: always
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://localhost:8080}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-superapikey}
      LOG_LEVEL: "ERROR,WARN"
      CONFIG_SESSION_PHONE_VERSION: "2.2413.51"
      LOG_BAILEYS: "error"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${EVOLUTION_DB_USER:-evolution}:${EVOLUTION_DB_PASSWORD:-evolution123}@evolution-postgres:5432/evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  n8n_data:
  n8n_postgres_data:
  evolution_instances:
  evolution_postgres_data:
