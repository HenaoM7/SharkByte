# ============================================================
# SharkByte — Configuración Nginx para Producción
# ============================================================
# Requisitos:
#   apt install nginx certbot python3-certbot-nginx
#   certbot --nginx -d app.sharkbyteia.com -d api.sharkbyteia.com -d n8n.sharkbyteia.com
#
# Dominios configurados:
#   app.sharkbyteia.com  → Frontend React  (/var/www/sharkbyte-app/dist)
#   api.sharkbyteia.com  → Backend NestJS  (:3000)
#   n8n.sharkbyteia.com  → n8n automation  (:5678)
#
# Copiar a: /etc/nginx/sites-available/sharkbyte
# Activar:  ln -s /etc/nginx/sites-available/sharkbyte /etc/nginx/sites-enabled/
#           nginx -t && systemctl reload nginx
# ============================================================

# ─── Redirigir HTTP → HTTPS ─────────────────────────────────
server {
    listen 80;
    server_name app.sharkbyteia.com api.sharkbyteia.com n8n.sharkbyteia.com;
    return 301 https://$host$request_uri;
}

# ─── Frontend React (app.sharkbyteia.com) ───────────────────
server {
    listen 443 ssl http2;
    server_name app.sharkbyteia.com;

    ssl_certificate     /etc/letsencrypt/live/app.sharkbyteia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.sharkbyteia.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/sharkbyte-app;
    index index.html;

    # React Router — todas las rutas sirven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets estáticos (Vite genera hashes en nombres)
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cabeceras de seguridad
    add_header X-Content-Type-Options    nosniff;
    add_header X-Frame-Options           SAMEORIGIN;
    add_header X-XSS-Protection          "1; mode=block";
    add_header Referrer-Policy           "strict-origin-when-cross-origin";

    access_log /var/log/nginx/sharkbyte-app-access.log;
    error_log  /var/log/nginx/sharkbyte-app-error.log;
}

# ─── Backend API (api.sharkbyteia.com) ──────────────────────
server {
    listen 443 ssl http2;
    server_name api.sharkbyteia.com;

    ssl_certificate     /etc/letsencrypt/live/app.sharkbyteia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.sharkbyteia.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ─── SEGURIDAD CRÍTICA: bloquear /internal/* desde internet ───
    # Los endpoints /internal/* son exclusivos para n8n (red interna Docker)
    # y NUNCA deben ser accesibles desde internet.
    location /internal {
        deny all;
        return 403 '{"error":"Forbidden"}';
        add_header Content-Type application/json;
    }

    # Webhook Stripe — permitir desde cualquier IP (Stripe necesita acceso)
    location /webhooks/stripe {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Stripe requiere el body sin modificar (raw)
        proxy_request_buffering off;
        client_max_body_size 1m;
    }

    # ─── Webhooks Multi-Canal ─────────────────────────────────────
    # Meta (Facebook + Instagram): verificación GET y eventos POST
    location /webhooks/meta {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        client_max_body_size 5m;
    }

    # Telegram: cada bot usa su propio token como sub-ruta
    location /webhooks/telegram/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        client_max_body_size 5m;
    }

    # TikTok: verificación GET y eventos POST
    location /webhooks/tiktok {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        client_max_body_size 5m;
    }

    # API pública
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 25m;  # Para uploads de imágenes/PDF
    }

    # Cabeceras de seguridad
    add_header X-Content-Type-Options    nosniff;
    add_header X-Frame-Options           DENY;
    add_header X-XSS-Protection          "1; mode=block";
    add_header Referrer-Policy           "strict-origin-when-cross-origin";
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()";

    # Swagger — descomentar para bloquear en producción
    # location /api-docs {
    #     deny all;
    #     return 404;
    # }

    access_log /var/log/nginx/sharkbyte-api-access.log;
    error_log  /var/log/nginx/sharkbyte-api-error.log;
}

# ─── n8n (n8n.sharkbyteia.com) ──────────────────────────────
server {
    listen 443 ssl http2;
    server_name n8n.sharkbyteia.com;

    ssl_certificate     /etc/letsencrypt/live/app.sharkbyteia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.sharkbyteia.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # n8n requiere WebSocket para el editor y ejecuciones en tiempo real
    location / {
        proxy_pass         http://127.0.0.1:5678;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # n8n executions can take a long time
        proxy_buffering    off;
    }

    # Restricción por IP opcional (solo acceso desde oficina/VPN)
    # allow 203.0.113.0/24;  # Ejemplo: IP de oficina
    # deny all;

    access_log /var/log/nginx/sharkbyte-n8n-access.log;
    error_log  /var/log/nginx/sharkbyte-n8n-error.log;
}
